title: "README Workflow Demo"
width: 80
height: 24
shell: bash

settings:
  prompt: "$ "
  typing-speed: 0.02 # average seconds per keystroke
  typing-jitter: 0.01 # random variance (±) per keystroke
  pre-delay: 0.5 # pause before typing starts
  post-delay: 1.2 # pause after output before next step

render:
  theme:
    preset: dark
  window: macos

steps:
  - run: scenetake init
  - run: cat scenario.yaml
  - run: scenetake scenario.yaml --format svg
  - run: MSYS_NO_PATHCONV=1 docker run --rm -v "//${PWD}:/data" ghcr.io/asciinema/agg /data/scenario.cast /data/scenario.gif
    stream-output: true
    max-duration: 15
    silence-threshold: 0.3
    max-idle: 0.1
  - run: ping 127.0.0.1
    stream-output: true
    max-duration: 15
    silence-threshold: 0.3
    max-idle: 0.1

Post:
  - rm -f scenario.*
