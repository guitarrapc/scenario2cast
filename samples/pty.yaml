title: "PTY Demo"
width: 80
height: 24
shell: bash

settings:
  prompt: "$ "
  typing-speed: 0.02 # average seconds per keystroke
  typing-jitter: 0.01 # random variance (±) per keystroke
  pre-delay: 0.4 # pause before typing starts
  post-delay: 1.0 # pause after output before next step

steps:
  - echo "Showing a simple PTY with matrix https://github.com/guitarrapc/matrix"
  - name: echo in PTY with continue
    run: echo "Running inside PTY"
    pty: true
    pty-continue: true
  - name: TUI command in PTY with continue
    run: matrix 3
    pty: true
    pty-continue: true
  - echo "Continue after PTY"
